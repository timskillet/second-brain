version: "3.9"

services:
  llama:
    image: ghcr.io/ggerganov/llama.cpp:full
    container_name: llama
    command: >
      --server
        -m /models/zephyr-7b-alpha.Q5_K_M.gguf
        --ctx-size 4096
        --host 0.0.0.0
        --port 8001
    volumes:
      - ./models:/models          # put your model file here
    ports:
      - "8001:8001"               # expose llama.cpp server
    restart: unless-stopped
